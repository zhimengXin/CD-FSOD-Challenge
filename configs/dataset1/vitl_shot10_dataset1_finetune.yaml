DATASETS:
  TEST: !!python/tuple
  - dataset1_test
  TRAIN: ("dataset1_10shot",)
DE:
  ATTN_FUSE_RATIO: 0.7
  BG_CLS_LOSS_WEIGHT: 0.2
  BG_PROTOTYPES: weights/background/background_prototypes.vitl14.pth
  CLASS_PROTOTYPES: prototypes_init/dataset1_10shot.vitl14.bbox.p1.sk.pkl
  SET_CD_VITO: true
  TOPK: 8
INPUT:
  FORMAT: RGB
  MAX_SIZE_TEST: 1333
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MIN_SIZE_TRAIN: (640, 672, 704, 736, 768, 800)
  MIN_SIZE_TRAIN_SAMPLING: choice
MODEL:
  BACKBONE:
    NAME: build_dino_v2_vit
    TYPE: large
  MASK_ON: false
  META_ARCHITECTURE: OpenSetDetectorWithExamples
  PIXEL_MEAN:
  - 0.48145466
  - 0.4578275
  - 0.40821073
  PIXEL_STD:
  - 0.26862954
  - 0.26130258
  - 0.27577711
  ROI_BOX_HEAD:
    CLS_AGNOSTIC_BBOX_REG: true
    NAME: ''
    NUM_FC: 0
    POOLER_RESOLUTION: 7
  ROI_HEADS:
    SCORE_THRESH_TEST: 0.001
  RPN:
    HEAD_NAME: StandardRPNHead
    IN_FEATURES:
    - res4
  WEIGHTS: weights/trained/vitl_0089999.pth
SOLVER:
  BASE_LR: 0.001
  CHECKPOINT_PERIOD: 300
  IMS_PER_BATCH: 16
  MAX_ITER: 300
  STEPS: (150, 350)
  WARMUP_ITERS: 50
TEST:
  EVAL_PERIOD: 300
_BASE_: ../Base-RCNN-C4.yaml
